<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mukarram Ali Hanjra | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* High-End Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.4;
            pointer-events: none;
            z-index: 999;
        }

        /* Background Glows */
        .glow {
            position: fixed;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        .pre-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 200;
            letter-spacing: -2px;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Bento Grid Section */
        .container {
            padding: 100px 10%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
        }

        /* Specific Card Sizes */
        .profile-card { grid-column: span 2; grid-row: span 2; display: flex; flex-direction: column; justify-content: space-between; }
        .social-card { grid-column: span 2; }
        .info-card { grid-column: span 1; }
        .edu-card { grid-column: span 1; }

        .profile-img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
    transition: 0.5s;
        }
        h2 { font-weight: 400; font-size: 1.5rem; margin-bottom: 15px; }

        /* Social Link Styling */
        .social-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .s-btn {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .s-btn:hover { background: #fff; color: #000; }

        /* Scroll Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: 1s all ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; padding: 50px 5%; }
            .profile-card, .social-card, .info-card, .edu-card { grid-column: span 1; }
            h1 { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="glow" style="top: -10%; right: -10%;"></div>
    <div class="glow" style="bottom: 10%; left: -10%;"></div>

    <section class="hero">
        <p class="pre-title reveal">The Portfolio of</p>
        <h1 class="reveal">Mukarram Ali<br>Hanjra</h1>
        <div class="location reveal">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            Gujranwala, Pakistan
        </div>
    </section>

    <div class="container">
        
        <div class="card profile-card reveal">
            <img src="image.jpg" alt="Mukarram Ali" class="profile-img">
            <div>
                <h2 style="margin-top: 20px;">Identity</h2>
                <p style="color: var(--text-secondary);">Focused</p>
            </div>
        </div>

        <div class="card social-card reveal">
            <h2>Digital Presence</h2>
            <p style="color: var(--text-secondary);">Find me on social platforms where I share my journey and insights.</p>
            <div class="social-links">
                <a href="https://www.instagram.com/mukarram_ali_hunjra/" class="s-btn">Instagram</a>
                <a href="https://www.tiktok.com/@m.hunjra0" class="s-btn">TikTok</a>
            </div>
        </div>

        <div class="card info-card reveal">
            <small style="color: var(--text-secondary);">Current Status</small>
            <h2 style="margin-top:10px">FSC Pre-Engineering</h2>
            <p style="font-size: 0.8rem; color: var(--text-secondary);">Student</p>
        </div>

        <div class="card edu-card reveal" style="background: linear-gradient(45deg, #111, #000);">
            <div style="height: 100%; display: flex; align-items: center; justify-content: center;">
                <span style="font-family: 'Playfair Display'; font-style: italic; font-size: 1.5rem; opacity: 0.5;">born. 2007</span>
            </div>
        </div>

    </div>

    <footer style="padding: 100px 0; text-align: center; border-top: 1px solid var(--border);">
        <p style="color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 2px;">DESIGNED FOR EXCELLENCE BY  
      MUKARAM VIRK</p>
    </footer>

    <script>
        // Smooth Reveal Logic
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

        // Magnetic Cursor Effect for cards (Subtle)
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);
            });
        });
    </script>
</body>
</html>
